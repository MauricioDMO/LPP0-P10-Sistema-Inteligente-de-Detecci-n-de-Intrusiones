services:
  elasticsearch:
    build:
      context: ./elasticsearch
      args:
        STACK_VERSION: ${STACK_VERSION}
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      network.host: 0.0.0.0
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
      - eslogs:/usr/share/elasticsearch/logs
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: always

  kibana:
    build:
      context: ./kibana
      args:
        STACK_VERSION: ${STACK_VERSION}
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      SERVER_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:5601:5601"
    restart: always

  suricata:
    build:
      context: ./suricata
    container_name: suricata
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      SURICATA_INTERFACE: ${SURICATA_INTERFACE}
    volumes:
      - ./suricata/config/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./suricata/config/classification.config:/etc/suricata/classification.config:ro
      - ./suricata/config/reference.config:/etc/suricata/reference.config:ro
      - ./suricata/config/threshold.config:/etc/suricata/threshold.config:ro
      - ./suricata/config/rules:/var/lib/suricata/rules:ro
      - suricata-logs:/var/log/suricata
    restart: always

  filebeat:
    build:
      context: ./filebeat
      args:
        STACK_VERSION: ${STACK_VERSION}
    container_name: filebeat
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_started
      suricata:
        condition: service_started
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./filebeat/modules.d:/usr/share/filebeat/modules.d:ro
      - suricata-logs:/var/log/suricata:ro
      - filebeat-data:/usr/share/filebeat/data
    command: [ "filebeat", "-e", "--strict.perms=false" ]
    restart: always

volumes:
  esdata:
  eslogs:
  filebeat-data:
  suricata-logs:
